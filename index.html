<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Unlocks Map</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
    }

    #videoContainer,
    #mapContainer {
        width: 640px;
        margin: 0 auto;
    }

    #mapContainer {
        display: none;
    }
</style>
</head>
<body>

<div id="videoContainer">
    <h2>Watch the video to unlock the map</h2>
    <div id="player"></div>
</div>

<div id="mapContainer">
    <h3>Map Unlocked</h3>
    <iframe
        src="https://www.google.com/maps/d/u/1/embed?mid=1K1VrCHns0nVC-WQim4xzsP_KW5ZzUSA&ehbc=2E312F"
        width="640"
        height="480"
        style="border:0;"
        allowfullscreen>
    </iframe>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

// Called automatically by the YouTube API
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '390',
        width: '640',
        videoId: '3U8WNyUVFkE',
        playerVars: {
            rel: 0
        },
        events: {
            onStateChange: onPlayerStateChange
        }
    });
}

// When the video finishes
function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {

        // Hide the video section
        document.getElementById('videoContainer').style.display = 'none';

        // Show the map
        document.getElementById('mapContainer').style.display = 'block';
    }
}
</script>

</body>
</html>
